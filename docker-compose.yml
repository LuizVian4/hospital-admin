services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: escala_hospital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile.dev
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/escala_hospital
      NODE_ENV: development
      PORT: 3001
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:5173
      ADMIN_EMAIL: admin@hospital.local
      ADMIN_PASSWORD: admin123
    ports:
      - "3001:3001"
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/shared/src:/app/packages/shared/src
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run build -w @escala/shared && npm run db:migrate -w @escala/backend && npm run dev -w @escala/backend"

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src
      - ./packages/frontend/public:/app/packages/frontend/public
      - ./packages/frontend/index.html:/app/packages/frontend/index.html
      - ./packages/frontend/vite.config.ts:/app/packages/frontend/vite.config.ts
    depends_on:
      - backend
    command: npm run dev -w @escala/frontend -- --host 0.0.0.0

volumes:
  pgdata:
